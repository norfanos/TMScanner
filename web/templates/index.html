<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDC Las Vegas — Price Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:      #080c14;
      --card:    #0f1623;
      --border:  #1a2436;
      --blue:    #3b82f6;
      --green:   #10b981;
      --amber:   #f59e0b;
      --red:     #ef4444;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 32px;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .header-left h1 { font-size: 1.3rem; font-weight: 700; }
    .header-left h1 span { color: var(--blue); }
    .header-left p  { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
    }
    .dot.live { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }
    .card.blue::before  { background: var(--blue); }
    .card.green::before { background: var(--green); }
    .card.amber::before { background: var(--amber); }
    .card.red::before   { background: var(--red); }
    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .card-value {
      font-size: 2.1rem;
      font-weight: 700;
      line-height: 1;
    }
    .card.blue  .card-value { color: var(--blue); }
    .card.green .card-value { color: var(--green); }
    .card.amber .card-value { color: var(--amber); }
    .card.red   .card-value { color: var(--red); }
    .card-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 6px;
      min-height: 18px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .badge.up   { background: rgba(239,68,68,0.15);  color: var(--red);   }
    .badge.down { background: rgba(16,185,129,0.15); color: var(--green); }
    .badge.flat { background: rgba(100,116,139,0.15); color: var(--muted); }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .chart-header h2 {
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    .chart-header .legend {
      display: flex;
      gap: 16px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot  { width: 10px; height: 3px; border-radius: 2px; }
    canvas { max-height: 300px; }

    /* ── Buy button ── */
    .buy-wrap {
      display: flex;
      justify-content: center;
      padding-top: 4px;
    }
    .buy-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--blue);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 13px 36px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .buy-btn:hover { background: #2563eb; transform: translateY(-2px); }
    .buy-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>EDC Las Vegas — <span>GA+ Scanner</span></h1>
    <p>Ticketmaster Exchange · Refreshes every 5s</p>
  </div>
  <div class="status">
    <div class="dot live" id="status-dot"></div>
    <span id="last-updated">Connecting…</span>
  </div>
</header>

<div class="cards">
  <div class="card blue">
    <div class="card-label">GA+ Current</div>
    <div class="card-value" id="val-ga-plus">—</div>
    <div class="card-sub"  id="sub-ga-plus"></div>
  </div>
  <div class="card green">
    <div class="card-label">GA Current</div>
    <div class="card-value" id="val-ga">—</div>
    <div class="card-sub"  id="sub-ga"></div>
  </div>
  <div class="card amber">
    <div class="card-label">GA+ All-Time Low</div>
    <div class="card-value" id="val-low">—</div>
    <div class="card-sub"  id="sub-low">since tracking started</div>
  </div>
  <div class="card red">
    <div class="card-label">Alert Threshold</div>
    <div class="card-value">${{ threshold }}</div>
    <div class="card-sub"  id="sub-threshold">Monitoring…</div>
  </div>
</div>

<div class="chart-wrap">
  <div class="chart-header">
    <h2>Price History</h2>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> GA+</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> GA</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444;opacity:.6"></div> Trend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;opacity:.5;height:2px;border-top:1px dashed #f59e0b"></div> ${{ threshold }}</div>
    </div>
  </div>
  <canvas id="chart"></canvas>
</div>

<div class="buy-wrap">
  <a class="buy-btn"
     href="{{ scan_url }}"
     target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
    </svg>
    Buy Now on Ticketmaster Exchange
  </a>
</div>

<script>
  const THRESHOLD = {{ threshold }};
  let chart = null;
  let prevGaPlus = null;
  let prevGa = null;
  let allTimeLow = null;
  let allTimeLowTs = null;

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function fmtTs(ts) {
    const d = new Date(ts * 1000);
    const now = new Date();
    if ((now - d) < 86400000) {
      return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }
    return d.toLocaleDateString([], {month: 'short', day: 'numeric'})
           + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  }

  function badge(curr, prev) {
    if (prev == null || curr == null) return '';
    const diff = curr - prev;
    if (diff === 0) return '<span class="badge flat">no change</span>';
    const cls   = diff > 0 ? 'up' : 'down';
    const arrow = diff > 0 ? '▲' : '▼';
    return `<span class="badge ${cls}">${arrow} $${Math.abs(diff)}</span>`;
  }

  function linReg(values) {
    const pts = values
      .map((y, x) => ({x, y}))
      .filter(p => p.y != null);
    if (pts.length < 2) return values.map(() => null);
    const n   = pts.length;
    const sx  = pts.reduce((a, p) => a + p.x, 0);
    const sy  = pts.reduce((a, p) => a + p.y, 0);
    const sxy = pts.reduce((a, p) => a + p.x * p.y, 0);
    const sx2 = pts.reduce((a, p) => a + p.x * p.x, 0);
    const slope     = (n * sxy - sx * sy) / (n * sx2 - sx * sx);
    const intercept = (sy - slope * sx) / n;
    return values.map((_, x) => Math.round(slope * x + intercept));
  }

  // ── Chart ────────────────────────────────────────────────────────────────────
  function initChart(labels, gaPlus, ga) {
    const ctx   = document.getElementById('chart').getContext('2d');
    const trend = linReg(gaPlus);
    const flat  = labels.map(() => THRESHOLD);

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'GA+',
            data: gaPlus,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.07)',
            borderWidth: 2,
            tension: 0.35,
            fill: true,
            pointRadius: gaPlus.length > 80 ? 0 : 3,
            pointHoverRadius: 5,
            spanGaps: true,
          },
          {
            label: 'GA',
            data: ga,
            borderColor: '#10b981',
            backgroundColor: 'transparent',
            borderWidth: 2,
            tension: 0.35,
            pointRadius: ga.length > 80 ? 0 : 3,
            pointHoverRadius: 5,
            spanGaps: true,
          },
          {
            label: 'GA+ Trend',
            data: trend,
            borderColor: 'rgba(239,68,68,0.65)',
            backgroundColor: 'transparent',
            borderWidth: 2,
            borderDash: [6, 4],
            pointRadius: 0,
            spanGaps: true,
          },
          {
            label: 'Alert ($730)',
            data: flat,
            borderColor: 'rgba(245,158,11,0.45)',
            backgroundColor: 'transparent',
            borderWidth: 1,
            borderDash: [3, 4],
            pointRadius: 0,
          },
        ],
      },
      options: {
        responsive: true,
        animation: { duration: 400 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a2436',
            titleColor: '#e2e8f0',
            bodyColor: '#94a3b8',
            borderColor: '#2a3a50',
            borderWidth: 1,
            padding: 12,
            callbacks: {
              label: c => ` ${c.dataset.label}: $${c.parsed.y}`
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#475569', maxTicksLimit: 10, maxRotation: 0 },
            grid:  { color: 'rgba(255,255,255,0.03)' },
          },
          y: {
            ticks: { color: '#475569', callback: v => '$' + v },
            grid:  { color: 'rgba(255,255,255,0.03)' },
          }
        }
      }
    });
  }

  function updateChart(labels, gaPlus, ga) {
    if (!chart) { initChart(labels, gaPlus, ga); return; }
    const trend = linReg(gaPlus);
    const flat  = labels.map(() => THRESHOLD);
    chart.data.labels           = labels;
    chart.data.datasets[0].data = gaPlus;
    chart.data.datasets[1].data = ga;
    chart.data.datasets[2].data = trend;
    chart.data.datasets[3].data = flat;
    chart.data.datasets[0].pointRadius = gaPlus.length > 80 ? 0 : 3;
    chart.data.datasets[1].pointRadius = ga.length > 80 ? 0 : 3;
    chart.update('none');
  }

  // ── Cards refresh (every 5 s via /api/current) ───────────────────────────────
  async function refreshCards() {
    try {
      const res  = await fetch('/api/current');
      const data = await res.json();
      if (!data.ts) return;

      const gp = data.ga_plus;
      const g  = data.ga;

      document.getElementById('val-ga-plus').textContent = gp ? `$${gp}` : '—';
      document.getElementById('val-ga').textContent      = g  ? `$${g}`  : '—';
      document.getElementById('sub-ga-plus').innerHTML   = badge(gp, prevGaPlus);
      document.getElementById('sub-ga').innerHTML        = badge(g,  prevGa);

      // All-time low
      if (gp != null && (allTimeLow == null || gp < allTimeLow)) {
        allTimeLow   = gp;
        allTimeLowTs = data.ts;
      }
      document.getElementById('val-low').textContent = allTimeLow != null ? `$${allTimeLow}` : '—';
      document.getElementById('sub-low').textContent = allTimeLowTs ? `at ${fmtTs(allTimeLowTs)}` : 'since tracking started';

      // Threshold indicator
      const tEl = document.getElementById('sub-threshold');
      if (gp != null && gp < THRESHOLD) {
        tEl.innerHTML = '<span style="color:#ef4444;font-weight:600">⚠ BELOW THRESHOLD</span>';
      } else if (gp != null) {
        const diff = gp - THRESHOLD;
        tEl.textContent = `$${diff} above limit`;
      }

      document.getElementById('last-updated').textContent = 'Updated ' + fmtTs(data.ts);
      document.getElementById('status-dot').classList.add('live');

      prevGaPlus = gp;
      prevGa     = g;
    } catch (_) {
      document.getElementById('status-dot').classList.remove('live');
    }
  }

  // ── Chart refresh (every 30 s via /api/prices) ───────────────────────────────
  async function refreshChart() {
    try {
      const res  = await fetch('/api/prices');
      const data = await res.json();
      if (!data.length) return;

      const labels = data.map(d => fmtTs(d.ts));
      const gaPlus = data.map(d => d.ga_plus);
      const ga     = data.map(d => d.ga);

      // Seed all-time low from full history
      const validGaPlus = gaPlus.filter(v => v != null);
      if (validGaPlus.length) {
        const low    = Math.min(...validGaPlus);
        const lowIdx = gaPlus.indexOf(low);
        if (allTimeLow == null || low < allTimeLow) {
          allTimeLow   = low;
          allTimeLowTs = data[lowIdx]?.ts;
        }
      }

      updateChart(labels, gaPlus, ga);
    } catch (_) {}
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────
  refreshCards();
  refreshChart();
  setInterval(refreshCards, 5000);
  setInterval(refreshChart, 30000);
</script>
</body>
</html>
